    <!-- SPA Routing for GitHub Pages -->
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path query string
      // into the correct url format for the SPA to work
      var pathSegmentsToKeep = 1; // Keep /dash
      var l = window.location;
      if (l.search.includes('?/')) {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.slice(0, pathSegmentsToKeep) +
          l.search.replace(/^\/?(.*)/, '$1').replace(/~and~/g, '&') +
          l.hash
        );
      }
    </script>
